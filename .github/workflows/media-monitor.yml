name: Daily media monitor

on:
  schedule:
    # 08:00 China time. GitHub Actions cron is UTC.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Publication date to scan, in YYYY-MM-DD format"
        required: false
        type: string

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        run: |
          args=(--db data/media_monitor.sqlite3)
          if [ -n "${{ inputs.date }}" ]; then
            args+=(--date "${{ inputs.date }}")
          fi
          python scripts/media_monitor.py "${args[@]}"
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME || secrets.GMAIL_USERNAME || secrets.GMAIL_ADDRESS }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || secrets.GMAIL_APP_PASSWORD || secrets.GMAIL_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM || secrets.GMAIL_FROM || secrets.GMAIL_USERNAME || secrets.GMAIL_ADDRESS }}
          SMTP_TLS: ${{ secrets.SMTP_TLS || 'true' }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO || secrets.GMAIL_TO }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}

      - name: Commit database updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update media monitor database
          file_pattern: data/media_monitor.sqlite3
