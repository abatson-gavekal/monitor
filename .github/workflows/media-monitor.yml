name: Daily media monitor

on:
  schedule:
    # 08:00 China time. GitHub Actions cron is UTC.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Publication date to scan, in YYYY-MM-DD format"
        required: false
        type: string
      send_email:
        description: "Send email alerts for new matches"
        required: true
        default: true
        type: boolean

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Normalize email settings
        env:
          RAW_SMTP_HOST: ${{ secrets.SMTP_HOST }}
          RAW_SMTP_PORT: ${{ secrets.SMTP_PORT }}
          RAW_SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          RAW_SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RAW_SMTP_FROM: ${{ secrets.SMTP_FROM }}
          RAW_SMTP_TLS: ${{ secrets.SMTP_TLS }}
          RAW_ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          RAW_GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          RAW_GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          RAW_GMAIL_ACCOUNT: ${{ secrets.GMAIL_ACCOUNT }}
          RAW_GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          RAW_GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RAW_GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RAW_GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          RAW_GMAIL_TO: ${{ secrets.GMAIL_TO }}
          RAW_EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          RAW_EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RAW_EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RAW_EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          first_nonempty() {
            for value in "$@"; do
              if [ -n "$value" ]; then
                printf '%s' "$value"
                return 0
              fi
            done
            return 0
          }

          smtp_host="$(first_nonempty "$RAW_SMTP_HOST" "smtp.gmail.com")"
          smtp_port="$(first_nonempty "$RAW_SMTP_PORT" "587")"
          smtp_username="$(first_nonempty "$RAW_SMTP_USERNAME" "$RAW_GMAIL_USERNAME" "$RAW_GMAIL_ADDRESS" "$RAW_GMAIL_ACCOUNT" "$RAW_GMAIL_EMAIL" "$RAW_EMAIL_USERNAME")"
          smtp_password="$(first_nonempty "$RAW_SMTP_PASSWORD" "$RAW_GMAIL_APP_PASSWORD" "$RAW_GMAIL_PASSWORD" "$RAW_EMAIL_PASSWORD")"
          smtp_from="$(first_nonempty "$RAW_SMTP_FROM" "$RAW_GMAIL_FROM" "$smtp_username" "$RAW_EMAIL_FROM")"
          smtp_tls="$(first_nonempty "$RAW_SMTP_TLS" "true")"
          alert_email_to="$(first_nonempty "$RAW_ALERT_EMAIL_TO" "$RAW_GMAIL_TO" "$RAW_EMAIL_TO")"

          report_secret() {
            label="$1"
            value="$2"
            if [ -n "$value" ]; then
              echo "$label: configured"
            else
              echo "$label: missing"
            fi
          }

          echo "Email secret presence check:"
          report_secret "GMAIL_USERNAME" "$RAW_GMAIL_USERNAME"
          report_secret "GMAIL_ADDRESS" "$RAW_GMAIL_ADDRESS"
          report_secret "GMAIL_ACCOUNT" "$RAW_GMAIL_ACCOUNT"
          report_secret "GMAIL_EMAIL" "$RAW_GMAIL_EMAIL"
          report_secret "GMAIL_APP_PASSWORD" "$RAW_GMAIL_APP_PASSWORD"
          report_secret "GMAIL_PASSWORD" "$RAW_GMAIL_PASSWORD"
          report_secret "GMAIL_TO" "$RAW_GMAIL_TO"
          report_secret "EMAIL_USERNAME" "$RAW_EMAIL_USERNAME"
          report_secret "EMAIL_PASSWORD" "$RAW_EMAIL_PASSWORD"
          report_secret "EMAIL_TO" "$RAW_EMAIL_TO"
          report_secret "SMTP_USERNAME" "$RAW_SMTP_USERNAME"
          report_secret "SMTP_PASSWORD" "$RAW_SMTP_PASSWORD"
          report_secret "ALERT_EMAIL_TO" "$RAW_ALERT_EMAIL_TO"

          missing=()
          [ -z "$smtp_username" ] && missing+=("sender account: set GMAIL_USERNAME to your full Gmail address")
          [ -z "$smtp_password" ] && missing+=("app password: set GMAIL_APP_PASSWORD to a Gmail app password")
          [ -z "$alert_email_to" ] && missing+=("recipient: set GMAIL_TO to the destination email address")

          if [ "${#missing[@]}" -gt 0 ]; then
            if [ "${{ inputs.send_email }}" = "true" ]; then
              printf '::error::Missing email secret(s): %s\n' "${missing[*]}"
              exit 1
            fi
            printf '::warning::Email disabled because secret(s) are missing: %s\n' "${missing[*]}"
          fi

          {
            echo "SMTP_HOST=$smtp_host"
            echo "SMTP_PORT=$smtp_port"
            echo "SMTP_USERNAME=$smtp_username"
            echo "SMTP_PASSWORD=$smtp_password"
            echo "SMTP_FROM=$smtp_from"
            echo "SMTP_TLS=$smtp_tls"
            echo "ALERT_EMAIL_TO=$alert_email_to"
          } >> "$GITHUB_ENV"

      - name: Run monitor
        run: |
          args=(--db data/media_monitor.sqlite3)
          if [ -n "${{ inputs.date }}" ]; then
            args+=(--date "${{ inputs.date }}")
          fi
          if [ "${{ inputs.send_email }}" != "true" ]; then
            args+=(--no-email)
          fi
          python scripts/media_monitor.py "${args[@]}"

      - name: Commit database updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update media monitor database
          file_pattern: data/media_monitor.sqlite3
